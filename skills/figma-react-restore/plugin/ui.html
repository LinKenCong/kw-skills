<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root { font: 12px/1.45 ui-sans-serif, system-ui, sans-serif; color: var(--figma-color-text); background: var(--figma-color-bg); }
    body { margin: 0; padding: 16px; }
    h1 { font-size: 15px; margin: 0 0 12px; }
    code { padding: 2px 5px; border-radius: 4px; background: var(--figma-color-bg-secondary); }
    pre { height: 315px; overflow: auto; padding: 10px; border-radius: 6px; background: var(--figma-color-bg-secondary); white-space: pre-wrap; }
    .status { margin: 8px 0; color: var(--figma-color-text-secondary); }
    .status strong { color: var(--figma-color-text); }
  </style>
</head>
<body>
  <h1>Figma React Restore</h1>
  <div class="status">Runtime: <code id="endpoint"></code></div>
  <div id="status" class="status"><strong>Starting</strong></div>
  <div class="status">Keep this plugin window open. It registers automatically and listens for extraction jobs.</div>
  <pre id="log"></pre>
<script>
(function initProtocol(globalScope) {
  const protocol = {
    SERVICE_URL: 'http://127.0.0.1:49327',
    HEARTBEAT_MS: 5000,
    POLL_MS: 1000,
    UPLOAD_MAX_ATTEMPTS: 3,
    UPLOAD_RETRY_BASE_DELAY_MS: 400,
    UPLOAD_RETRY_MAX_DELAY_MS: 2400,
    JOB_STATUS: {
      queued: 'queued',
      extracting: 'extracting',
      uploading: 'uploading',
      reporting: 'reporting',
      completed: 'completed',
      failed: 'failed',
      canceled: 'canceled',
      orphaned: 'orphaned',
    },
    RETRYABLE_HTTP_STATUSES: [408, 425, 429, 500, 502, 503, 504],
    RETRYABLE_ERROR_CODES: ['NETWORK_ERROR', 'SERVICE_UNAVAILABLE', 'INTERNAL_ERROR', 'INVALID_JSON'],
    NON_RETRYABLE_UPLOAD_CODES: ['ARTIFACT_TOO_LARGE', 'UPLOAD_BASE64_TOO_LARGE', 'UNSUPPORTED_MEDIA_TYPE', 'MEDIA_TYPE_MISMATCH'],
  };
  globalScope.FrrProtocol = protocol;
})(typeof window === 'undefined' ? globalThis : window);
</script>
<script>
(function initPluginShared(globalScope) {
  const protocol = globalScope.FrrProtocol || {};

  class ServiceRequestError extends Error {
    constructor(message, options) {
      super(message);
      this.name = 'ServiceRequestError';
      this.code = options && options.code ? options.code : 'SERVICE_REQUEST_FAILED';
      this.httpStatus = options && typeof options.httpStatus === 'number' ? options.httpStatus : 500;
      this.recoverable = options && typeof options.recoverable === 'boolean' ? options.recoverable : false;
      this.hint = options && options.hint ? options.hint : undefined;
      this.retryable = options && typeof options.retryable === 'boolean' ? options.retryable : false;
      this.details = options && options.details ? options.details : undefined;
    }
  }

  function computeBackoffDelay(attempt, baseDelay, maxDelay) {
    const base = typeof baseDelay === 'number' && baseDelay > 0 ? baseDelay : 250;
    const max = typeof maxDelay === 'number' && maxDelay > 0 ? maxDelay : 2000;
    const jitter = 0.85 + Math.random() * 0.3;
    const delay = Math.min(max, base * (2 ** Math.max(0, attempt - 1)));
    return Math.round(delay * jitter);
  }

  function shouldRetryServiceError(error) {
    if (!error) return false;
    if (error.retryable === true) return true;
    if (Array.isArray(protocol.NON_RETRYABLE_UPLOAD_CODES) && protocol.NON_RETRYABLE_UPLOAD_CODES.includes(error.code)) return false;
    if (Array.isArray(protocol.RETRYABLE_ERROR_CODES) && protocol.RETRYABLE_ERROR_CODES.includes(error.code)) return true;
    if (Array.isArray(protocol.RETRYABLE_HTTP_STATUSES) && protocol.RETRYABLE_HTTP_STATUSES.includes(error.httpStatus)) return true;
    return false;
  }

  function normalizeServiceError(payload, fallbackStatus) {
    const bodyError = payload && payload.error ? payload.error : null;
    const message = bodyError && bodyError.message ? bodyError.message : `HTTP ${fallbackStatus}`;
    const error = new ServiceRequestError(message, {
      code: bodyError && bodyError.code ? bodyError.code : 'SERVICE_REQUEST_FAILED',
      httpStatus: fallbackStatus,
      recoverable: bodyError && typeof bodyError.recoverable === 'boolean' ? bodyError.recoverable : fallbackStatus >= 500,
      hint: bodyError && bodyError.hint ? bodyError.hint : undefined,
      details: bodyError && bodyError.details ? bodyError.details : undefined,
    });
    error.retryable = shouldRetryServiceError(error);
    return error;
  }

  function createJobTracker() {
    const jobs = {};
    const terminal = new Set([
      protocol.JOB_STATUS && protocol.JOB_STATUS.completed,
      protocol.JOB_STATUS && protocol.JOB_STATUS.failed,
      protocol.JOB_STATUS && protocol.JOB_STATUS.canceled,
    ].filter(Boolean));

    function ensure(jobId) {
      if (!jobs[jobId]) {
        jobs[jobId] = {
          jobId,
          status: protocol.JOB_STATUS ? protocol.JOB_STATUS.queued : 'queued',
          attempts: {},
          updatedAt: Date.now(),
          source: 'unknown',
        };
      }
      return jobs[jobId];
    }

    return {
      upsert(job, source) {
        const entry = ensure(job.jobId);
        if (terminal.has(entry.status)) return entry;
        entry.source = source || entry.source;
        entry.jobSecret = job.jobSecret || entry.jobSecret;
        entry.capability = job.capability || entry.capability;
        entry.status = entry.status || (protocol.JOB_STATUS ? protocol.JOB_STATUS.queued : 'queued');
        entry.updatedAt = Date.now();
        return entry;
      },
      mark(jobId, status, patch) {
        const entry = ensure(jobId);
        if (terminal.has(entry.status) && !terminal.has(status)) return entry;
        entry.status = status;
        entry.updatedAt = Date.now();
        if (patch && typeof patch === 'object') Object.assign(entry, patch);
        return entry;
      },
      markAttempt(jobId, key, attempt) {
        const entry = ensure(jobId);
        entry.attempts[key] = attempt;
        entry.updatedAt = Date.now();
        return entry;
      },
      get(jobId) {
        return jobs[jobId];
      },
      values() {
        return Object.values(jobs);
      },
      canStart(jobId) {
        const entry = jobs[jobId];
        if (!entry) return true;
        return !terminal.has(entry.status) && entry.status !== (protocol.JOB_STATUS ? protocol.JOB_STATUS.extracting : 'extracting') && entry.status !== (protocol.JOB_STATUS ? protocol.JOB_STATUS.uploading : 'uploading') && entry.status !== (protocol.JOB_STATUS ? protocol.JOB_STATUS.reporting : 'reporting');
      },
      isTerminal(jobId) {
        const entry = jobs[jobId];
        return Boolean(entry && terminal.has(entry.status));
      },
    };
  }

  globalScope.FrrPluginShared = {
    ServiceRequestError,
    computeBackoffDelay,
    normalizeServiceError,
    shouldRetryServiceError,
    createJobTracker,
  };
})(typeof window === 'undefined' ? globalThis : window);
</script>
<script>
const protocol = window.FrrProtocol;
const shared = window.FrrPluginShared;
const SERVICE_URL = protocol.SERVICE_URL;
const HEARTBEAT_MS = protocol.HEARTBEAT_MS;
const POLL_MS = protocol.POLL_MS;

function storageGet(key) {
  try {
    return window.localStorage ? window.localStorage.getItem(key) : null;
  } catch (_error) {
    return null;
  }
}

function storageSet(key, value) {
  try {
    if (window.localStorage) window.localStorage.setItem(key, value);
  } catch (_error) {
    // Figma may load plugin UI from a data: URL where localStorage is disabled.
  }
}

const state = {
  pluginSessionId: storageGet('frr.sessionId') || `ps_${Date.now().toString(36)}_${Math.random().toString(16).slice(2)}`,
  session: null,
  events: null,
  pollTimer: null,
  heartbeatTimer: null,
  reconnectTimer: null,
  reconnectDelayMs: 1000,
  connecting: false,
  registered: false,
  jobTracker: shared.createJobTracker(),
  jobSecrets: {},
};
storageSet('frr.sessionId', state.pluginSessionId);

const endpointEl = document.getElementById('endpoint');
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');
endpointEl.textContent = SERVICE_URL;

window.onmessage = async function (event) {
  const message = event.data.pluginMessage;
  if (!message) return;
  if (message.type === 'session-info') {
    state.session = message.session;
    setStatus(`Session ${state.pluginSessionId}; selection=${message.session.selectionCount}`);
    log(`Session info: ${JSON.stringify(message.session)}`);
    if (state.registered) {
      registerSession(true).catch(handleConnectionError);
    } else {
      scheduleReconnect('session info', 0);
    }
    return;
  }
  if (message.type === 'progress') {
    await postJobJson(message.jobId, `/jobs/${message.jobId}/progress`, message.progress).catch(showError);
    log(`Progress ${message.jobId}: ${message.progress.stage}`);
    return;
  }
  if (message.type === 'extract-error') {
    await reportExtractionFailure(message.jobId, message.error).catch(showError);
    log(`Extraction failed: ${message.error.message}`);
    return;
  }
  if (message.type === 'extraction-ready') {
    try {
      state.jobTracker.mark(message.jobId, protocol.JOB_STATUS.uploading);
      await finishExtraction(message);
      state.jobTracker.mark(message.jobId, protocol.JOB_STATUS.completed);
    } catch (error) {
      await reportExtractionFailure(message.jobId, error).catch(showError);
      showError(error);
    }
  }
};

requestSessionInfo();
scheduleReconnect('startup', 0);

function requestSessionInfo() {
  parent.postMessage({ pluginMessage: { type: 'get-session' } }, '*');
}

function scheduleReconnect(reason, delayMs) {
  if (state.reconnectTimer) clearTimeout(state.reconnectTimer);
  const delay = typeof delayMs === 'number' ? delayMs : state.reconnectDelayMs;
  state.reconnectTimer = setTimeout(function () {
    state.reconnectTimer = null;
    connectRuntime(reason).catch(handleConnectionError);
  }, delay);
}

async function connectRuntime(reason) {
  if (state.connecting) return;
  state.connecting = true;
  setStatus(`Connecting to runtime (${reason})`);
  try {
    if (!state.session) {
      requestSessionInfo();
      await sleep(150);
    }
    await registerSession(false);
    await reconcileOrphanedJobs();
    state.reconnectDelayMs = 1000;
    startHeartbeat();
    connectEvents();
  } finally {
    state.connecting = false;
  }
}

async function registerSession(silent) {
  const session = state.session || {
    fileName: 'Unknown',
    currentPageId: '',
    currentPageName: '',
    selectionCount: 0,
    capabilities: ['extract.selection'],
  };
  const payload = {
    pluginSessionId: state.pluginSessionId,
    fileName: session.fileName,
    currentPageId: session.currentPageId,
    currentPageName: session.currentPageName,
    selectionCount: session.selectionCount,
    capabilities: session.capabilities || ['extract.selection'],
  };
  const data = await postJson('/sessions/register', payload);
  state.registered = true;
  if (!silent) {
    setStatus(`Connected; selection=${data.session.selectionCount}`);
    log('Registered runtime session automatically');
  }
  return data.session;
}

function connectEvents() {
  if (state.events) state.events.close();
  stopPolling();
  const url = `${SERVICE_URL}/events?sessionId=${encodeURIComponent(state.pluginSessionId)}`;
  log(`Connecting events: ${SERVICE_URL}`);
  state.events = new EventSource(url);
  state.events.addEventListener('ready', function () {
    setStatus('Connected by event stream');
    log('Event stream ready');
  });
  state.events.addEventListener('ping', function () {});
  state.events.addEventListener('job.created', function (event) {
    const data = JSON.parse(event.data);
    handleJob(data.job, 'received');
  });
  state.events.addEventListener('job.canceled', function (event) {
    const data = JSON.parse(event.data);
    state.jobTracker.mark(data.job.jobId, protocol.JOB_STATUS.canceled);
    log(`Job canceled: ${data.job.jobId}`);
  });
  state.events.onerror = function () {
    log(`Event stream unavailable; readyState=${state.events ? state.events.readyState : 'closed'}; using polling fallback`);
    if (state.events) state.events.close();
    state.events = null;
    setStatus('Connected by polling fallback');
    startPolling();
  };
}

function startHeartbeat() {
  if (state.heartbeatTimer) return;
  state.heartbeatTimer = setInterval(function () {
    registerSession(true).catch(function (error) {
      log(`Runtime heartbeat failed: ${error.message || String(error)}`);
      markInFlightJobsOrphaned();
      resetConnection();
      handleConnectionError(error);
    });
  }, HEARTBEAT_MS);
}

function startPolling() {
  if (state.pollTimer) return;
  log(`Polling runtime jobs every ${POLL_MS / 1000}s`);
  state.pollTimer = setInterval(function () {
    pollJobs().catch(handleConnectionError);
  }, POLL_MS);
  pollJobs().catch(handleConnectionError);
}

function stopPolling() {
  if (!state.pollTimer) return;
  clearInterval(state.pollTimer);
  state.pollTimer = null;
}

function stopHeartbeat() {
  if (!state.heartbeatTimer) return;
  clearInterval(state.heartbeatTimer);
  state.heartbeatTimer = null;
}

async function pollJobs() {
  const data = await getJson(`/jobs?sessionId=${encodeURIComponent(state.pluginSessionId)}&status=pending`);
  const jobs = data.jobs || [];
  for (const job of jobs) handleJob(job, 'polled');
}

function handleJob(job, source) {
  if (!job || !job.jobId) return;
  const entry = state.jobTracker.upsert(job, source);
  if (job.jobSecret) state.jobSecrets[job.jobId] = job.jobSecret;
  if (!state.jobTracker.canStart(job.jobId)) return;
  if (entry.capability !== 'extract.selection') return;
  state.jobTracker.mark(job.jobId, protocol.JOB_STATUS.extracting);
  log(`Job ${source}: ${job.jobId} ${job.capability}`);
  parent.postMessage({ pluginMessage: { type: 'extract-selection', job } }, '*');
}

async function finishExtraction(message) {
  for (let i = 0; i < message.artifacts.length; i += 1) {
    const artifact = message.artifacts[i];
    const dataBase64 = bytesToBase64(artifact.bytes);
    await uploadArtifactWithRetry(message.jobId, {
      artifactId: artifact.artifactId,
      kind: artifact.kind,
      fileName: artifact.fileName,
      mediaType: artifact.mediaType,
      sourceNodeId: artifact.sourceNodeId,
      dataBase64,
    }, i + 1, message.artifacts.length);
  }
  state.jobTracker.mark(message.jobId, protocol.JOB_STATUS.reporting);
  await postJobJson(message.jobId, `/jobs/${message.jobId}/result`, { ok: true, result: message.extraction });
  log(`Extraction completed for job ${message.jobId}`);
}

async function uploadArtifactWithRetry(jobId, payload, index, total) {
  let attempt = 0;
  let lastError;
  while (attempt < protocol.UPLOAD_MAX_ATTEMPTS) {
    attempt += 1;
    state.jobTracker.markAttempt(jobId, payload.artifactId, attempt);
    try {
      await postJobJson(jobId, `/jobs/${jobId}/artifacts`, payload);
      log(`Uploaded artifact ${payload.artifactId} (${index}/${total}) attempt=${attempt}`);
      return;
    } catch (error) {
      lastError = error;
      const normalized = shared.normalizeServiceError({ error: normalizeErrorPayload(error) }, error.httpStatus || 500);
      if (!shared.shouldRetryServiceError(normalized) || attempt >= protocol.UPLOAD_MAX_ATTEMPTS) break;
      const delay = shared.computeBackoffDelay(attempt, protocol.UPLOAD_RETRY_BASE_DELAY_MS, protocol.UPLOAD_RETRY_MAX_DELAY_MS);
      log(`Retry artifact ${payload.artifactId} (${attempt}/${protocol.UPLOAD_MAX_ATTEMPTS}) in ${delay}ms: ${normalized.code}`);
      await sleep(delay);
    }
  }
  throw lastError;
}

async function reportExtractionFailure(jobId, error) {
  if (!jobId) return false;
  const normalized = normalizeErrorPayload(error);
  state.jobTracker.mark(jobId, protocol.JOB_STATUS.reporting, { error: normalized });
  try {
    await postJobJson(jobId, `/jobs/${jobId}/result`, {
      ok: false,
      error: {
        code: normalized.code,
        message: normalized.message,
        recoverable: normalized.recoverable,
        hint: normalized.hint,
        httpStatus: normalized.httpStatus,
      },
    });
    state.jobTracker.mark(jobId, protocol.JOB_STATUS.failed, { error: normalized });
    log(`Extraction marked failed for job ${jobId}: ${normalized.code}`);
    return true;
  } catch (reportError) {
    const reportFailure = normalizeErrorPayload(reportError);
    if (isRetryableReportFailure(reportError)) {
      state.jobTracker.mark(jobId, protocol.JOB_STATUS.orphaned, {
        error: {
          code: 'PLUGIN_FAILURE_REPORT_UNSENT',
          message: `Plugin could not report extraction failure: ${reportFailure.message}`,
          recoverable: true,
          originalErrorCode: normalized.code,
        },
      });
      log(`Failure report for job ${jobId} was not acknowledged: ${reportFailure.code}; will reconcile after reconnect`);
      handleConnectionError(reportError);
      return false;
    }
    state.jobTracker.mark(jobId, protocol.JOB_STATUS.failed, { error: reportFailure });
    throw reportError;
  }
}

function isRetryableReportFailure(error) {
  return error instanceof shared.ServiceRequestError && shared.shouldRetryServiceError(error);
}

function normalizeErrorPayload(error) {
  if (!error) {
    return { code: 'UNKNOWN_PLUGIN_ERROR', message: 'Unknown plugin error', recoverable: true, hint: 'Retry extraction.' };
  }
  if (error instanceof shared.ServiceRequestError) {
    return {
      code: error.code,
      message: error.message,
      recoverable: error.code === 'ARTIFACT_TOO_LARGE' || error.code === 'UPLOAD_BASE64_TOO_LARGE' ? false : (error.recoverable !== false),
      hint: error.hint || (error.retryable ? 'The runtime request is retryable; retry extraction after runtime recovers.' : 'Retry extraction or reduce selection scope.'),
      httpStatus: error.httpStatus,
    };
  }
  const message = error.message || String(error);
  return {
    code: 'ARTIFACT_UPLOAD_FAILED',
    message,
    recoverable: true,
    hint: 'Retry extraction with a smaller selection or fewer/lighter assets.',
  };
}

async function postJson(endpoint, body) {
  let response;
  try {
    response = await fetch(`${SERVICE_URL}${endpoint}`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
  } catch (error) {
    throw new shared.ServiceRequestError(error.message || String(error), {
      code: 'NETWORK_ERROR',
      httpStatus: 503,
      recoverable: true,
      hint: 'Ensure figma-react-restore service is running.',
      retryable: true,
    });
  }
  const data = await parseResponseJson(response);
  if (!response.ok || data.ok === false) throw shared.normalizeServiceError(data, response.status);
  return data;
}

async function postJobJson(jobId, endpoint, body) {
  const jobSecret = state.jobSecrets[jobId];
  if (!jobSecret) {
    throw new shared.ServiceRequestError(`Missing job secret for ${jobId}`, {
      code: 'JOB_SECRET_MISSING',
      httpStatus: 401,
      recoverable: true,
      hint: 'Wait for job polling to return a valid jobSecret.',
      retryable: true,
    });
  }
  let response;
  try {
    response = await fetch(`${SERVICE_URL}${endpoint}`, {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-frr-plugin-session-id': state.pluginSessionId,
        'x-frr-job-secret': jobSecret,
      },
      body: JSON.stringify(body),
    });
  } catch (error) {
    throw new shared.ServiceRequestError(error.message || String(error), {
      code: 'NETWORK_ERROR',
      httpStatus: 503,
      recoverable: true,
      hint: 'Ensure figma-react-restore service is reachable.',
      retryable: true,
    });
  }
  const data = await parseResponseJson(response);
  if (!response.ok || data.ok === false) throw shared.normalizeServiceError(data, response.status);
  return data;
}

async function getJson(endpoint) {
  let response;
  try {
    response = await fetch(`${SERVICE_URL}${endpoint}`, { method: 'GET' });
  } catch (error) {
    throw new shared.ServiceRequestError(error.message || String(error), {
      code: 'NETWORK_ERROR',
      httpStatus: 503,
      recoverable: true,
      hint: 'Ensure figma-react-restore service is reachable.',
      retryable: true,
    });
  }
  const data = await parseResponseJson(response);
  if (!response.ok || data.ok === false) throw shared.normalizeServiceError(data, response.status);
  return data;
}

async function parseResponseJson(response) {
  try {
    return await response.json();
  } catch (error) {
    throw new shared.ServiceRequestError(error.message || String(error), {
      code: 'INVALID_JSON',
      httpStatus: response.status || 500,
      recoverable: true,
      hint: 'Runtime response is not valid JSON.',
      retryable: true,
    });
  }
}

function resetConnection() {
  state.registered = false;
  if (state.events) state.events.close();
  state.events = null;
  stopPolling();
  stopHeartbeat();
}

function markInFlightJobsOrphaned() {
  for (const job of state.jobTracker.values()) {
    if (!job) continue;
    if ([protocol.JOB_STATUS.extracting, protocol.JOB_STATUS.uploading, protocol.JOB_STATUS.reporting].includes(job.status)) {
      state.jobTracker.mark(job.jobId, protocol.JOB_STATUS.orphaned, { error: { code: 'PLUGIN_CONNECTION_LOST', message: 'Plugin disconnected while processing job', recoverable: true } });
    }
  }
}

async function reconcileOrphanedJobs() {
  const orphaned = state.jobTracker.values().filter((job) => job.status === protocol.JOB_STATUS.orphaned);
  for (const job of orphaned) {
    try {
      await postJobJson(job.jobId, `/jobs/${job.jobId}/result`, {
        ok: false,
        error: {
          code: 'PLUGIN_CONNECTION_LOST',
          message: 'Plugin connection reset while processing extraction job.',
          recoverable: true,
          hint: 'Retry extraction from CLI after plugin reconnects.',
        },
      });
      state.jobTracker.mark(job.jobId, protocol.JOB_STATUS.failed);
      log(`Reconciled orphaned job ${job.jobId} as recoverable failure`);
    } catch (error) {
      log(`Skip orphaned job reconcile ${job.jobId}: ${error.message || String(error)}`);
    }
  }
}

function handleConnectionError(error) {
  markInFlightJobsOrphaned();
  resetConnection();
  const message = error.message || String(error);
  setStatus(`Waiting for runtime at ${SERVICE_URL}`);
  log(`Connection failed: ${message}; retrying`);
  state.reconnectDelayMs = Math.min(Math.round(state.reconnectDelayMs * 1.6), 10000);
  scheduleReconnect('retry', state.reconnectDelayMs);
}

function bytesToBase64(bytes) {
  const array = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
  let binary = '';
  const chunkSize = 0x8000;
  for (let i = 0; i < array.length; i += chunkSize) {
    binary += String.fromCharCode.apply(null, array.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

function setStatus(message) {
  statusEl.innerHTML = `<strong>${escapeHtml(message)}</strong>`;
}

function log(message) {
  const line = `[${new Date().toLocaleTimeString()}] ${message}`;
  logEl.textContent = `${line}\n${logEl.textContent}`.slice(0, 6000);
}

function showError(error) {
  const message = error.message || String(error);
  setStatus('Error');
  log(`ERROR: ${message}`);
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function sleep(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}
</script>
</body>
</html>
